<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRACE‑X Chat</title>
  <style>
    /* Basic styles for a simple chat interface */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a1f 0%, #0f1433 100%);
      color: #fdfdfd;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .message {
      margin-bottom: 0.75rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .message.user {
      color: #64c8ff;
    }
    .message.assistant {
      color: #d4af37;
    }
    #form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(0, 0, 0, 0.3);
    }
    #input {
      flex: 1;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #444;
      border-radius: 4px;
      background-color: #0f2146;
      color: #fdfdfd;
    }
    #send {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #64c8ff;
      color: #0a0a1f;
      cursor: pointer;
    }
    #send:hover {
      background-color: #7fd3ff;
    }
  </style>
</head>
<body>
  <div id="chat"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Type your message…" autocomplete="off" required />
    <button id="send" type="submit">Send</button>
  </form>
  <script>
    // Simple front‑end script to interact with the chat and voice endpoints
    const chatContainer = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    let graceAudio = null;
    // We'll accumulate the full conversation history so the assistant has context
    const messages = [];
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      appendMessage('user', text);
      // push the user message onto the history
      messages.push({ role: 'user', content: text });
      input.value = '';
      try {
        // Send the current conversation history to the chat endpoint
        const chatResp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        if (!chatResp.ok) {
          const err = await chatResp.json().catch(() => ({}));
          throw new Error(err.error || 'Chat request failed');
        }
        const data = await chatResp.json();
        const reply = data.reply && data.reply.content ? data.reply.content : '';
        // store assistant reply in history
        messages.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);
        // attempt to speak the reply using the voice endpoint
        await playGraceVoice(reply);
      } catch (err) {
        console.error(err);
        appendMessage('assistant', 'Sorry, there was an error processing your request.');
      }
    });
    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.classList.add('message', role);
      div.textContent = (role === 'user' ? 'You: ' : 'Grace: ') + text;
      chatContainer.appendChild(div);
      // Scroll to bottom
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    async function playGraceVoice(text) {
      if (!text) return;
      try {
        const voiceResp = await fetch('/api/voice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!voiceResp.ok) {
          // voice may be unavailable if no API key – silently fail
          return;
        }
        const audioBlob = await voiceResp.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        if (graceAudio) {
          graceAudio.pause();
          graceAudio.src = '';
        }
        graceAudio = new Audio(audioUrl);
        graceAudio.onended = () => {
          URL.revokeObjectURL(audioUrl);
        };
        await graceAudio.play();
      } catch (e) {
        console.error('Voice playback error:', e);
      }
    }
  </script>
</body>
</html>
